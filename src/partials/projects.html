<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wioryleca-meblenawymiar</title>
  </head>
  <body>
    <header class="header">
      <include src="./src/partials/header.html"></include>
    </header>

    <main>
      <section class="categories">
        <ul class="categories__list">
          <li class="categories__item">
            <button
              id="wardrobeButton"
              class="categories__button"
              type="button"
              data-category="wardrobe"
            >
              <svg class="categories__icon categories__icon--wardrobe">
                <use href="../../public/icons.svg#wardrobe"></use>
              </svg>
              Szafy
            </button>
          </li>
          <li class="categories__item">
            <button
              class="categories__button"
              type="button"
              data-category="kitchen"
            >
              <svg class="categories__icon">
                <use href="../../public/icons.svg#kitchen"></use>
              </svg>
              Kuchnie
            </button>
          </li>
          <li class="categories__item">
            <button
              class="categories__button"
              type="button"
              data-category="bathroom"
            >
              <svg class="categories__icon">
                <use href="../../public/icons.svg#bathroom"></use>
              </svg>
              Lazienki
            </button>
          </li>
          <li class="categories__item">
            <button
              class="categories__button"
              type="button"
              data-category="built-in"
            >
              <svg class="categories__icon">
                <use href="../../public/icons.svg#drawer"></use>
              </svg>
              Zabudowy
            </button>
          </li>
        </ul>
      </section>

      <section class="projects">
        <ul id="projectList" class="projects__list">
          <!-- <li class="projects__list-item">
            <button class="projects__list-button" type="button">
              <img
                class="projects__list-img"
                src="/images/hero.png"
                alt="Projekt mebli na wymiar"
              />
            </button>
          </li> -->
        </ul>
      </section>
    </main>

    <footer class="footer">
      <include src="./src/partials/footer.html"></include>
    </footer>

    <include src="./src/partials/modalContact.html"></include>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
