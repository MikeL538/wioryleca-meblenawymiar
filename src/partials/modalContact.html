<div class="modal__backdrop" id="modalContact" aria-hidden="true">
  <div
    class="modal__contact"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalContactTitle"
  >
    <button
      class="modal__close"
      type="button"
      aria-label="Zamknij okno kontaktowe"
    >
      &times;
    </button>

    <div class="modal__header">
      <p class="modal__eyebrow">Kontakt</p>
      <h2 class="modal__title" id="modalContactTitle">Zamów meble na wymiar</h2>
      <p class="modal__text">
        Opisz krótko, czego potrzebujesz. Odezwiemy się i ustalimy szczegóły
        realizacji.
      </p>
    </div>

    <ul class="modal__details" aria-label="Dane kontaktowe">
      <li class="modal__details-item">
        <span class="modal__details-label">Telefon</span>
        <a class="modal__details-link" href="tel:+48727198709"
          >+48 727 198 709</a
        >
      </li>
      <li class="modal__details-item">
        <span class="modal__details-label">E-mail</span>
        <a class="modal__details-link" href="mailto:wiory_leca@wp.pl"
          >wiory_leca@wp.pl</a
        >
      </li>
      <li class="modal__details-item">
        <span class="modal__details-label">Obszar</span>
        <span>Wrocław, Bolesławiec, Żagań i okolice</span>
      </li>
    </ul>

    <form class="modal__form" method="post" enctype="text/plain">
      <label class="modal__field">
        <span>*Imie i nazwisko</span>
        <input
          id="contactName"
          class="modal__input"
          type="text"
          name="name"
          autocomplete="name"
          required
          maxlength="100"
        />
      </label>

      <label class="modal__field">
        <span>*Lokalizacja</span>
        <input
          id="contactLocalization"
          class="modal__input"
          type="text"
          name="localization"
          autocomplete="street-address"
          required
          maxlength="100"
        />
      </label>

      <label class="modal__field">
        <span>*Telefon lub e-mail</span>
        <input
          id="contactContact"
          class="modal__input"
          type="text"
          name="contact"
          autocomplete="email"
          required
          maxlength="100"
        />
      </label>

      <label class="modal__field">
        <span>*Wiadomość</span>
        <textarea
          id="contactMessage"
          class="modal__input modal__textarea"
          name="message"
          rows="4"
          maxlength="2500"
          required
        ></textarea>
      </label>

      <label class="modal__field">
        <span>Preferowany sposób kontaktu oraz godziny</span>
        <textarea
          id="contactPreferable"
          class="modal__input"
          name="preferable"
          rows="3"
          maxlength="250"
          placeholder="Opcjonalne, np. SMS / WhatsApp / Messenger+link do profilu lub telefon - środy między 17 a 19."
        ></textarea>
      </label>

      <button id="contactButton" class="modal__button" type="submit">
        Wyślij zapytanie
      </button>
    </form>
  </div>
</div>
